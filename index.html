<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-card">
        <audio id="audio-element"></audio>

        <div class="header">
            <span class="material-symbols-outlined icon-btn">expand_more</span>
            <span class="title">Now playing</span>
            <span class="material-symbols-outlined icon-btn">more_horiz</span>
        </div>

        <div class="artwork-wrapper">
            <div id="track-art" class="track-art"></div>
        </div>

        <div class="track-info">
            <h2 id="track-name">Song Title</h2>
            <p id="track-artist">Artist Name</p>
        </div>

        <div class="timeline-area">
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
            </div>
            <div class="time-stamps">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="controllers">
            <span class="material-symbols-outlined action-btn secondary-btn" id="repeat-btn">repeat</span>
            <span class="material-symbols-outlined action-btn primary-btn" id="prev-btn">skip_previous</span>
            <div class="play-pause-wrapper" id="play-btn">
                <span class="material-symbols-outlined fill">play_arrow</span>
            </div>
            <span class="material-symbols-outlined action-btn primary-btn" id="next-btn">skip_next</span>
            <span class="material-symbols-outlined action-btn secondary-btn" id="queue-open-btn">queue_music</span>
        </div>

        <div class="playlist-overlay" id="playlist-drawer">
            <div class="playlist-header">
                <div class="title-group">
                    <span class="material-symbols-outlined">queue_music</span>
                    <h3>Music list</h3>
                </div>
                <span class="material-symbols-outlined close-btn" id="queue-close-btn">close</span>
            </div>
            <div class="playlist-tracks" id="playlist-items-container">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
